<audio id="audio"></audio>

<script src="/music/playlist.js"></script>
<script>
(function(){
  'use strict';
  if(typeof LOCAL_SONGS==='undefined'){LOCAL_SONGS=[];}

  var audio=document.getElementById('audio');
  var cover=document.getElementById('cover');
  var disc=document.getElementById('disc');
  var titleEl=document.getElementById('title');
  var artistEl=document.getElementById('artist');
  var fill=document.getElementById('fill');
  var curEl=document.getElementById('current');
  var totEl=document.getElementById('total');
  var playBtn=document.getElementById('play');
  var progressBar=document.getElementById('progressBar');

  var playlist=LOCAL_SONGS;
  var index=0;

  function fmt(s){
    if(!s||!isFinite(s))return'0:00';
    return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  }

  function coverSrc(song){
    var n=song.src.replace(/\.mp3$/i,'').replace(/^audio\//,'');
    return 'cover/'+n+'.jpg';
  }
  function fallbackCover(song){
    return 'cover/'+(song.title||song.name||'default')+'.jpg';
  }

  function loadSong(i){
    if(playlist.length===0){titleEl.textContent='无歌曲';return}
    index=(i+playlist.length)%playlist.length;
    var s=playlist[index];
    titleEl.textContent=s.title||s.name||'';
    artistEl.textContent=s.artist||'';
    audio.src=s.src;
    cover.src=coverSrc(s);
    cover.onerror=function(){cover.src=fallbackCover(s)};
    fill.style.width='0%';curEl.textContent='0:00';totEl.textContent='0:00';
    disc.classList.remove('playing');playBtn.textContent='▶';
  }

  playBtn.addEventListener('click',async function(){
    if(playlist.length===0)return;
    if(!audio.src)loadSong(0);
    if(audio.paused){
      try{await audio.play()}catch(e){return}
      disc.classList.add('playing');playBtn.textContent='❚❚';
    }else{
      audio.pause();disc.classList.remove('playing');playBtn.textContent='▶';
    }
  });

  document.getElementById('next').addEventListener('click',function(){
    if(playlist.length===0)return;
    loadSong(index+1);
    audio.play().then(function(){disc.classList.add('playing');playBtn.textContent='❚❚'}).catch(function(){});
  });

  document.getElementById('prev').addEventListener('click',function(){
    if(playlist.length===0)return;
    if(audio.currentTime>3){audio.currentTime=0;return}
    loadSong(index-1);
    audio.play().then(function(){disc.classList.add('playing');playBtn.textContent='❚❚'}).catch(function(){});
  });

  audio.addEventListener('loadedmetadata',function(){totEl.textContent=fmt(audio.duration)});
  audio.addEventListener('timeupdate',function(){
    if(!audio.duration)return;
    fill.style.width=(audio.currentTime/audio.duration*100)+'%';
    curEl.textContent=fmt(audio.currentTime);
    totEl.textContent=fmt(audio.duration);
  });
  audio.addEventListener('ended',function(){
    disc.classList.remove('playing');playBtn.textContent='▶';
    loadSong(index+1);
    audio.play().then(function(){disc.classList.add('playing');playBtn.textContent='❚❚'}).catch(function(){});
  });

  progressBar.addEventListener('click',function(e){
    if(!audio.duration)return;
    var r=progressBar.getBoundingClientRect();
    audio.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*audio.duration;
  });

  /* ═══ 星空 + 水波 ═══ */
  var c=document.getElementById('bg');
  var ctx=c.getContext('2d');
  var stars=[],ripples=[];

  function resize(){
    c.width=innerWidth;c.height=innerHeight;
  }
  resize();window.addEventListener('resize',resize);

  for(var i=0;i<120;i++)stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2});

  window.addEventListener('mousemove',function(e){
    ripples.push({x:e.clientX,y:e.clientY,r:0,a:.3});
  });

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();
    }
    for(var i=ripples.length-1;i>=0;i--){
      var r=ripples[i];r.r+=2;r.a*=.97;
      ctx.strokeStyle='rgba(180,220,255,'+r.a+')';
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke();
      if(r.a<.02)ripples.splice(i,1);
    }
    requestAnimationFrame(draw);
  }
  draw();loadSong(0);
})();
</script>
